<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;font-family:'Barlow',system-ui,sans-serif;overflow:hidden;color:#fff}
#wrap{width:100vw;height:100vh;display:flex;flex-direction:column}
#hdr{
  padding:14px 24px 0;display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:10px;flex-shrink:0;
  background:linear-gradient(to bottom,rgba(8,8,8,0.95),transparent);
  position:relative;z-index:10;
}
.logo-area{display:flex;align-items:center;gap:12px}
.uso-logo-img{width:48px;height:48px;object-fit:contain}
.brand-text h2{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:#f0ece4;letter-spacing:0.08em}
.brand-text .sub{font-size:9px;letter-spacing:0.25em;color:rgba(201,168,76,0.55);text-transform:uppercase;font-weight:500}
#tg{display:flex;background:#111;border-radius:10px;padding:3px;border:1px solid rgba(201,168,76,0.18)}
#tg button{
  padding:7px 18px;border-radius:8px;border:none;cursor:pointer;
  font-size:12px;font-weight:500;font-family:'Barlow',sans-serif;
  transition:all .3s;text-transform:capitalize;background:transparent;color:#666;letter-spacing:0.03em;
}
#tg button.on{background:linear-gradient(135deg,#C9A84C,#E2C972);color:#080808;font-weight:600}
#tg button:hover:not(.on){color:#C9A84C}
#sp{padding:6px 24px 0;display:flex;gap:16px;font-size:11px;color:#555;flex-shrink:0;z-index:5;position:relative}
#sp b{color:#C9A84C;font-weight:600;margin-right:3px}
canvas{flex:1;cursor:grab;display:block;width:100%}
canvas:active{cursor:grabbing}
#ht{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(8,8,8,.88);padding:6px 20px;border-radius:20px;
  border:1px solid rgba(201,168,76,.2);font-size:11px;color:#777;
  pointer-events:none;z-index:5;backdrop-filter:blur(8px);letter-spacing:0.03em;
}
#ft{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:5}
.fc{background:rgba(14,14,14,.88);border-radius:8px;padding:5px 10px;border:1px solid rgba(201,168,76,.08);text-align:center;backdrop-filter:blur(8px)}
.fc span{font-size:14px;display:block;line-height:1.2}.fc small{font-size:8px;color:#888;letter-spacing:0.05em;text-transform:uppercase}
#loading{position:fixed;inset:0;z-index:100;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease}
#loading.done{opacity:0;pointer-events:none}
#loading .load-logo{width:72px;height:72px;object-fit:contain;margin-bottom:16px;animation:pulse-logo 2s ease-in-out infinite}
#loading p{font-size:11px;letter-spacing:0.2em;color:rgba(201,168,76,0.4);text-transform:uppercase}
@keyframes pulse-logo{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.05);opacity:1}}
</style>
</head>
<body>
<div id="loading"><img class="load-logo" id="loadLogo" alt="USO"><p>Loading 3D Model</p></div>
<div id="wrap">
<div id="hdr">
  <div class="logo-area">
    <img class="uso-logo-img" id="hdrLogo" alt="Upscale Outhouse">
    <div class="brand-text"><h2>Upscale Outhouse</h2><div class="sub">Veteran Owned &amp; Operated</div></div>
  </div>
  <div id="tg">
    <button class="on" onclick="SM('exterior')">Exterior</button>
    <button onclick="SM('floorplan')">Floor Plan</button>
    <button onclick="SM('interior')">Interior</button>
  </div>
</div>
<div id="sp"><div><b>20'&times;10'</b> Size</div><div><b>4</b> Doors</div><div><b>4</b> Stalls</div><div><b>3</b> Urinals</div><div><b>4</b> Sinks</div><div><b>300+</b> Guests</div></div>
<canvas id="c"></canvas>
</div>

function addExtStairs(px,pz,dir){
  var stW=0.7,numSteps=4,gap=0.06;
  var groundY=0,topY=TY+skH-0.02;
  var totalRise=topY-groundY,stH=totalRise/numSteps,stD=0.22,totalRun=numSteps*stD;
  var alMat=new THREE.MeshStandardMaterial({color:0xa8a8a8,roughness:0.3,metalness:0.7});
  var gripMat=new THREE.MeshStandardMaterial({color:0x555555,roughness:0.85,metalness:0.2});
  var halfW=stW/2;
  function pos(along,up,across){
    if(dir==='z+')return[px+across,up,pz+gap+along];
    if(dir==='z-')return[px+across,up,pz-gap-along];
    if(dir==='x+')return[px+gap+along,up,pz+across];
    return[px-gap-along,up,pz+across];
  }
  function mkBox(along,up,across,w,h,d,mat){
    var p=pos(along,up,across);
    if(dir==='z+'||dir==='z-')ext.add(B(d,h,w,mat,p[0],p[1],p[2]));
    else ext.add(B(w,h,d,mat,p[0],p[1],p[2]));
  }
  for(var s=0;s<numSteps;s++){
    var treadAlong=totalRun-(s+0.5)*stD;
    var treadY=groundY+(s+1)*stH;
    mkBox(treadAlong,treadY,0,stD,0.03,stW,alMat);
    mkBox(treadAlong,treadY+0.018,0,stD-0.04,0.004,stW-0.08,gripMat);
  }
  [-1,1].forEach(function(side){
    var sx=side*(halfW+0.015);
    for(var s=0;s<numSteps;s++){
      var segAlong=totalRun-(s+1)*stD;
      var segY=groundY+(s+1)*stH;
      mkBox(segAlong+stD,segY-stH/2,sx,0.025,stH,0.04,alMat);
      mkBox(segAlong+stD/2,segY-0.015,sx,stD,0.03,0.04,alMat);
    }
    mkBox(totalRun,groundY+0.015,sx,0.08,0.03,0.06,alMat);
  });
  [-1,1].forEach(function(side){
    var sx=side*(halfW+0.025);
    var railH=totalRise+0.55;
    var p=pos(0.03,groundY+railH/2,sx);
    var rail=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,railH,8),cM);
    rail.position.set(p[0],p[1],p[2]);ext.add(rail);
    var grabLen=0.2;
    if(dir==='z+'||dir==='z-')ext.add(B(0.018,0.018,grabLen,cM,p[0],groundY+railH-0.02,p[2]+(dir==='z+'?grabLen/2:-grabLen/2)));
    else ext.add(B(grabLen,0.018,0.018,cM,p[0]+(dir==='x+'?grabLen/2:-grabLen/2),groundY+railH-0.02,p[2]));
  });
}
